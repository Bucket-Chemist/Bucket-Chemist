name: Update Scholar Badges

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  update-badges:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 scholarly

      - name: Scrape Scholar & generate badges
        env:
          SCHOLAR_USER_ID: ${{ secrets.SCHOLAR_USER_ID }}
        run: python scripts/update_scholar_badges.py

      - name: Commit updated badges
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update scholar badges"
          file_pattern: "figs/scholar_badges/*"
