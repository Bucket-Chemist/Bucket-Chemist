name: Update Scholar Badges
on:
  schedule:
    - cron: '0 0 * * 1'  # weekly
  workflow_dispatch:       # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gsbg
      - run: python scripts/gen_badges.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update scholar badges"
